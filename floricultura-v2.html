      };
      reader.readAsDataURL(f);
    });
    document.getElementById('btn-save-cert')?.addEventListener('click',()=>{
      const pass=document.getElementById('cert-pass')?.value||'';
      const ambiente=document.getElementById('cert-ambiente')?.value||'homologacao';
      const serieNFe=document.getElementById('cert-serie-nfe')?.value||'001';
      const serieNFCe=document.getElementById('cert-serie-nfce')?.value||'001';
      const cnpj=document.getElementById('cert-cnpj')?.value||'';
      if(!_certBase64 && !JSON.parse(localStorage.getItem('fv_config')||'{}').certData)
        return toast('❌ Selecione o arquivo .pfx primeiro');
      if(!pass) return toast('❌ Informe a senha do certificado');
      const existing=JSON.parse(localStorage.getItem('fv_config')||'{}');
      const cfg={...existing,
        certData: _certBase64||existing.certData,
        certNome: document.querySelector('#cert-drop-label div:nth-child(2)')?.textContent||existing.certNome||'certificado.pfx',
        certPass: pass, certAmbiente: ambiente,
        certSerieNFe: serieNFe, certSerieNFCe: serieNFCe,
        cnpj: cnpj||existing.cnpj,
        certVencimento: 'Verificar via backend',
      };
      localStorage.setItem('fv_config',JSON.stringify(cfg));
      toast('✅ Certificado digital salvo!');
      render();
    });
    document.getElementById('btn-del-cert')?.addEventListener('click',()=>{
      const cfg=JSON.parse(localStorage.getItem('fv_config')||'{}');
      delete cfg.certData; delete cfg.certPass; delete cfg.certNome;
      localStorage.setItem('fv_config',JSON.stringify(cfg));
      toast('🗑️ Certificado removido'); render();
    });
    document.getElementById('btn-test-cert')?.addEventListener('click',()=>{
      toast('🔌 Testando certificado... Esta ação requer backend configurado com NFePHP ou DFe.');
    });
    document.getElementById('btn-sug')?.addEventListener('click',()=>{toast('💡 Sugestão enviada!');document.getElementById('sug-txt').value='';});
    document.getElementById('btn-save-layout')?.addEventListener('click',()=>{
      const layout={
        cor:document.getElementById('lay-cor')?.value||'#C8436A',
        fonte:document.getElementById('lay-fonte')?.value||'Georgia',
        tamanho:document.getElementById('lay-tam')?.value||'16',
      };
      localStorage.setItem('fv_card_layout',JSON.stringify(layout));
      toast('✅ Layout salvo!');
    });
    document.getElementById('btn-preview-card')?.addEventListener('click',()=>{
      const fakeOrder={orderNumber:'#0001',recipient:'Maria Silva',cardMessage:'Feliz aniversário com muito amor e carinho! Que seu dia seja especial. 🌹',identifyClient:true,clientName:'João Silva',items:[{name:'Buquê Premium',qty:1}]};
      S.orders.unshift(fakeOrder);
      printCard('');
      S.orders.shift();
    });
    // Notif template
    document.getElementById('notif-template')?.addEventListener('input',e=>{
      const preview=document.getElementById('notif-preview');
      if(preview) preview.textContent=e.target.value.replace(/{nome}/gi,'Maria').replace(/{produto}/gi,'Buquê Premium').replace(/{data}/gi,new Date().toLocaleDateString('pt-BR')).replace(/{floricultura}/gi,'Laços Eternos');
    });
    document.getElementById('btn-save-notif')?.addEventListener('click',()=>{
      const t=document.getElementById('notif-template')?.value;
      if(t){localStorage.setItem('fv_notif_cfg',JSON.stringify({template:t}));toast('✅ Mensagem salva!');}
    });
  }
  // Estoque
  if(S.page==='estoque'){
    document.getElementById('stock-unit-filter')?.addEventListener('change',e=>{S._stockUnit=e.target.value;render();});
    document.getElementById('btn-stock-entry')?.addEventListener('click',()=>showStockModal('','',  'Entrada'));
    document.getElementById('btn-stock-exit')?.addEventListener('click',()=>showStockModal('','','Saída'));
    document.getElementById('btn-new-transfer')?.addEventListener('click',showTransferModal);
    document.getElementById('btn-new-transfer2')?.addEventListener('click',showTransferModal);
    document.getElementById('btn-rel-prods')?.addEventListener('click',async()=>{
      S.loading=true;render();
      const [prods,moves]=await Promise.all([GET('/products'),GET('/stock/moves').catch(()=>[])]); 
      S.products=prods||[];S.stockMoves=moves||[];
      S.loading=false;render();
    });
    document.querySelectorAll('[data-sf]').forEach(b=>b.addEventListener('click',()=>{S._stockFilter=b.dataset.sf;render();}));
    document.querySelectorAll('[data-stock-add]').forEach(b=>b.addEventListener('click',()=>showStockModal(b.dataset.stockAdd,b.dataset.stockName,'Entrada')));
    document.querySelectorAll('[data-stock-rem]').forEach(b=>b.addEventListener('click',()=>showStockModal(b.dataset.stockRem,b.dataset.stockName,'Saída')));
  }
  if(S.page==='financeiro'){
    document.getElementById('fin-unit-filter')?.addEventListener('change',e=>{S._finUnit=e.target.value;render();});
    document.getElementById('btn-new-receita')?.addEventListener('click',()=>showFinModal('Receita'));
    document.getElementById('btn-new-despesa')?.addEventListener('click',()=>showFinModal('Despesa'));
    document.getElementById('btn-new-despesa2')?.addEventListener('click',()=>showFinModal('Despesa'));
    document.getElementById('btn-rel-fin')?.addEventListener('click',async()=>{
      S.loading=true;render();
      S.orders=await GET('/orders');
      S.loading=false;render();
    });
    document.querySelectorAll('[data-mark-paid]').forEach(b=>b.addEventListener('click',async()=>{
      try{
        await PATCH('/orders/'+b.dataset.markPaid+'/payment',{paymentStatus:'Pago'});
        S.orders=S.orders.map(o=>o._id===b.dataset.markPaid?{...o,paymentStatus:'Pago'}:o);
        render();toast('✅ Pagamento confirmado!');
      }catch(e){}
    }));
    document.querySelectorAll('[data-pay-bill]').forEach(b=>b.addEventListener('click',()=>{
      const entries = JSON.parse(localStorage.getItem('fv_financial')||'[]');
      const updated = entries.map(e=>e.id===b.dataset.payBill?{...e,status:'Pago',paidAt:new Date().toISOString()}:e);
      localStorage.setItem('fv_financial',JSON.stringify(updated));
      S.financialEntries=updated;render();toast('✅ Conta marcada como paga!');
    }));
  }
  // Delivery
  if(S.page==='delivery'||S.page==='entregador'){
    document.getElementById('btn-rel-orders')?.addEventListener('click',async()=>{S.loading=true;render();S.orders=await GET('/orders');S.loading=false;render();});
  }
  // Usuários
  if(S.page==='usuarios'){
    document.getElementById('btn-new-user')?.addEventListener('click', () => showNewUserModal());
    document.getElementById('user-search')?.addEventListener('input', e => { S._userSearch=e.target.value; render(); });
    document.getElementById('btn-rel-users')?.addEventListener('click', async () => {
      S.loading=true; render();
      const raw = await GET('/users').catch(()=>[]);
      S.users = (raw||[]).map(mergeUserExtra);
      S.loading=false; render();
    });
    document.querySelectorAll('[data-edit-user]').forEach(b => b.addEventListener('click', () => {
      const u = S.users.find(x => x._id===b.dataset.editUser);
      if(u) showNewUserModal(u);
    }));
    document.querySelectorAll('[data-toggle-user]').forEach(b => b.addEventListener('click', () => {
      toggleUserActive(b.dataset.toggleUser, b.dataset.active==='true');
    }));
    document.querySelectorAll('[data-del-user]').forEach(b => b.addEventListener('click', () => {
      deleteUser(b.dataset.delUser);
    }));
  }
}

// ── FULL IMG ─────────────────────────────────────────────────
function showFullImg(url){
  S._modal=`<div class="mo" id="mo" onclick="S._modal='';render()">
  <div style="background:#fff;border-radius:16px;padding:16px;max-width:500px;width:94%;text-align:center">
    <img src="${url}" style="max-width:100%;max-height:70vh;object-fit:contain;border-radius:8px;"/>
    <div style="margin-top:10px"><button class="btn btn-ghost" onclick="S._modal=\'\';render()">Fechar</button></div>
  </div></div>`;
  render();
}

// ── INIT ─────────────────────────────────────────────────────
async function init(){
  S.financialEntries = JSON.parse(localStorage.getItem('fv_financial')||'[]');
  if(loadSession()){
    S.loading=true;render();
    await loadData();
    S.loading=false;
    // Entregador sempre começa no módulo de entregas
    if(S.user?.role==='Entregador') S.page='entregador';
    startPolling(8000);
    startAutoBackup();
  }
  render();
}
init();
</script>
</body>
</html>
