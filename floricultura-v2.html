<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<meta http-equiv="X-Content-Type-Options" content="nosniff">
<meta http-equiv="X-Frame-Options" content="SAMEORIGIN">
<meta name="referrer" content="no-referrer">
<title>Laços Eternos — Sistema de Gestão</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --rose:#8B2252;--rose-l:#F5E0EC;--rose-d:#5A1035;
  --leaf:#1F5C2E;--leaf-l:#D6EFD8;--leaf-m:#3A8C50;
  --gold:#7A5C00;--gold-l:#FFF3CC;
  --purple:#5B3A8A;--purple-l:#EDE0FF;
  --blue:#1A3A7A;--blue-l:#DAEAFF;
  --red:#C0282A;--red-l:#FFE4E4;
  --cream:#FAF6F0;--petal:#FDF0F5;
  --ink:#1A0810;--ink2:#3D1A28;--muted:#8C6878;
  --border:rgba(139,34,82,0.14);
  --shadow:0 2px 20px rgba(90,16,53,0.08);
  --r:12px;--rl:18px;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'DM Sans',sans-serif;background:var(--cream);color:var(--ink);font-size:14px;min-height:100vh;}

/* AUTH */
.auth-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#1A0810 0%,#4A1530 50%,#1A0810 100%);}
.auth-card{background:#fff;border-radius:24px;padding:40px;width:100%;max-width:420px;box-shadow:0 20px 60px rgba(0,0,0,0.3);}
.auth-logo{text-align:center;margin-bottom:28px;}
.auth-logo .flower{font-size:48px;display:block;margin-bottom:8px;}
.auth-logo .name{font-family:'Playfair Display',serif;font-size:28px;color:var(--ink);display:block;}
.auth-logo .sub{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:2px;display:block;margin-top:4px;}

/* LAYOUT */
.app{display:flex;min-height:100vh;}
.sb{width:220px;min-height:100vh;background:linear-gradient(180deg,#1A0810 0%,#3D1228 60%,#2A0C20 100%);display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;z-index:100;transition:transform .3s;}
.sb-logo{padding:20px 16px 16px;border-bottom:1px solid rgba(255,255,255,.08);}
.sb-logo .flower{font-size:22px;}
.sb-logo .name{font-family:'Playfair Display',serif;font-size:19px;color:#fff;}
.sb-logo .unit-badge{font-size:10px;background:var(--rose);color:#fff;padding:2px 8px;border-radius:20px;display:inline-block;margin-top:4px;}
.sb-sec{padding:10px 0 2px 14px;font-size:9px;text-transform:uppercase;letter-spacing:2px;color:rgba(255,255,255,.25);}
.sb-item{display:flex;align-items:center;gap:8px;padding:8px 16px;cursor:pointer;color:rgba(255,255,255,.6);font-size:12px;transition:all .2s;border-left:3px solid transparent;}
.sb-item:hover{background:rgba(255,255,255,.06);color:#fff;}
.sb-item.active{background:rgba(200,67,106,.2);color:#fff;border-left-color:var(--rose);}
.sb-icon{width:16px;text-align:center;font-size:14px;flex-shrink:0;}
.sb-foot{margin-top:auto;padding:14px 16px;border-top:1px solid rgba(255,255,255,.08);}
.av{width:30px;height:30px;border-radius:50%;background:var(--rose);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:#fff;flex-shrink:0;}

.main{margin-left:220px;flex:1;display:flex;flex-direction:column;}
.topbar{background:#fff;border-bottom:1px solid var(--border);padding:0 24px;height:54px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;}
.page-title{font-family:'Playfair Display',serif;font-size:18px;}
.content{padding:20px;flex:1;}

/* CARDS */
.card{background:#fff;border-radius:var(--rl);border:1px solid var(--border);box-shadow:var(--shadow);padding:18px;margin-bottom:16px;}
.card-title{font-family:'Playfair Display',serif;font-size:15px;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between;}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;}

/* METRIC */
.mc{background:#fff;border-radius:var(--r);border:1px solid var(--border);padding:16px;position:relative;overflow:hidden;}
.mc::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;}
.mc.rose::before{background:var(--rose);}
.mc.leaf::before{background:var(--leaf);}
.mc.gold::before{background:var(--gold);}
.mc.purple::before{background:var(--purple);}
.mc.blue::before{background:var(--blue);}
.mc-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px;}
.mc-val{font-size:22px;font-weight:600;color:var(--ink);line-height:1;}
.mc-sub{font-size:10px;color:var(--leaf);margin-top:3px;}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:5px;padding:8px 14px;border-radius:8px;font-size:12px;font-weight:500;cursor:pointer;border:none;transition:all .2s;font-family:'DM Sans',sans-serif;}
.btn-primary{background:var(--rose);color:#fff;}
.btn-primary:hover{background:var(--rose-d);}
.btn-outline{background:transparent;color:var(--rose);border:1px solid var(--rose);}
.btn-outline:hover{background:var(--rose-l);}
.btn-ghost{background:transparent;color:var(--muted);border:1px solid var(--border);}
.btn-ghost:hover{background:var(--cream);}
.btn-green{background:var(--leaf);color:#fff;}
.btn-green:hover{background:#1B4332;}
.btn-blue{background:var(--blue);color:#fff;}
.btn-red{background:var(--red);color:#fff;}
.btn-sm{padding:5px 10px;font-size:11px;}
.btn-xs{padding:3px 8px;font-size:10px;}

/* FORMS */
.fg{margin-bottom:12px;}
.fl{font-size:11px;font-weight:500;color:var(--ink2);margin-bottom:4px;display:block;}
.fi{width:100%;padding:8px 11px;border:1px solid var(--border);border-radius:8px;font-family:'DM Sans',sans-serif;font-size:13px;color:var(--ink);background:#fff;outline:none;transition:border-color .2s;}
.fi:focus{border-color:var(--rose);box-shadow:0 0 0 3px rgba(200,67,106,.1);}
select.fi{cursor:pointer;}
textarea.fi{resize:vertical;min-height:65px;}
.fr2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.fr3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;}
.cb{display:flex;align-items:center;gap:8px;cursor:pointer;}
.cb input{accent-color:var(--rose);width:16px;height:16px;}

/* TABLE */
.tw{overflow-x:auto;}
table{width:100%;border-collapse:collapse;}
th{font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);padding:7px 10px;text-align:left;border-bottom:1px solid var(--border);font-weight:500;}
td{padding:9px 10px;border-bottom:1px solid var(--border);font-size:12px;}
tr:last-child td{border-bottom:none;}
tr:hover td{background:var(--petal);}

/* TAGS */
.tag{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:500;}
.t-rose{background:var(--rose-l);color:var(--rose-d);}
.t-green{background:var(--leaf-l);color:var(--leaf);}
.t-gold{background:var(--gold-l);color:var(--gold);}
.t-purple{background:var(--purple-l);color:var(--purple);}
.t-blue{background:var(--blue-l);color:var(--blue);}
.t-gray{background:#F3F4F6;color:#6B7280;}
.t-red{background:var(--red-l);color:var(--red);}

/* MODAL */
.mo{position:fixed;inset:0;background:rgba(26,10,16,.5);z-index:200;display:flex;align-items:center;justify-content:center;}
.mo-box{background:#fff;border-radius:24px;padding:24px;max-width:620px;width:94%;max-height:92vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.2);}
.mo-title{font-family:'Playfair Display',serif;font-size:18px;margin-bottom:18px;}
.mo-foot{display:flex;gap:8px;margin-top:16px;padding-top:16px;border-top:1px solid var(--border);}

/* TOAST / ALERT */
.toast{position:fixed;bottom:20px;right:20px;z-index:999;background:var(--ink);color:#fff;border-radius:var(--r);padding:10px 16px;font-size:12px;box-shadow:0 8px 30px rgba(0,0,0,.2);animation:su .3s ease;max-width:320px;}
@keyframes su{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}
.alert{border-radius:var(--r);padding:10px 14px;font-size:12px;margin-bottom:12px;display:flex;align-items:flex-start;gap:8px;}
.al-warn{background:var(--gold-l);color:var(--gold);border:1px solid rgba(183,134,15,.2);}
.al-ok{background:var(--leaf-l);color:var(--leaf);border:1px solid rgba(45,106,79,.2);}
.al-err{background:var(--red-l);color:var(--red);border:1px solid rgba(220,38,38,.15);}
.al-info{background:var(--blue-l);color:var(--blue);border:1px solid rgba(30,64,175,.15);}

/* MISC */
hr{border:none;border-top:1px solid var(--border);margin:12px 0;}
.empty{text-align:center;padding:32px 20px;color:var(--muted);}
.empty-icon{font-size:36px;margin-bottom:8px;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.6}}
.spin{display:inline-block;width:20px;height:20px;border:2px solid var(--rose-l);border-top-color:var(--rose);border-radius:50%;animation:sp .7s linear infinite;}
@keyframes sp{to{transform:rotate(360deg)}}
.loading{position:fixed;inset:0;background:rgba(255,255,255,.85);z-index:999;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:12px;}
.search-box{position:relative;}
.search-box input{padding-left:30px;}
.si{position:absolute;left:9px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:13px;}
.tabs{display:flex;gap:3px;background:var(--cream);border-radius:10px;padding:3px;border:1px solid var(--border);margin-bottom:14px;}
.tab{flex:1;padding:6px 8px;border-radius:8px;font-size:11px;cursor:pointer;border:none;background:transparent;color:var(--muted);text-align:center;transition:all .2s;}
.tab.active{background:#fff;color:var(--rose);box-shadow:var(--shadow);}
.pb{height:6px;border-radius:3px;background:#F3F4F6;overflow:hidden;}
.pf{height:100%;border-radius:3px;}
.notif{background:var(--rose);color:#fff;border-radius:20px;padding:1px 7px;font-size:10px;font-weight:600;}

/* ALERTS PANEL */
.alert-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:var(--r);margin-bottom:8px;border:1px solid var(--border);background:#fff;cursor:pointer;transition:all .2s;}
.alert-item:hover{border-color:var(--rose);}
.alert-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}

/* PDV */
.pdv-grid{display:grid;grid-template-columns:1fr 360px;gap:16px;}
.prod-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:10px;}
.prod-card{background:#fff;border:1px solid var(--border);border-radius:var(--r);padding:10px;cursor:pointer;transition:all .2s;text-align:center;}
.prod-card:hover,.prod-card.sel{border-color:var(--rose);box-shadow:0 4px 16px rgba(200,67,106,.12);}
.prod-card.sel{background:var(--petal);}
.prod-img{width:60px;height:60px;border-radius:8px;object-fit:cover;margin:0 auto 5px;}
.cart-item{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid var(--border);}
.qb{width:22px;height:22px;border-radius:50%;border:1px solid var(--border);background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--rose);font-size:13px;}
.qb:hover{background:var(--rose-l);}

/* PRODUÇÃO */
.prod-queue-card{background:#fff;border:1px solid var(--border);border-radius:var(--r);padding:14px;margin-bottom:10px;transition:all .2s;}
.prod-queue-card:hover{border-color:var(--rose);}
.prod-queue-card.priority{border-left:4px solid var(--red);}
.prod-queue-card.urgent{border-left:4px solid var(--gold);}

/* ENTREGADOR */
.delivery-card{background:#fff;border:1px solid var(--border);border-radius:var(--r);padding:14px;margin-bottom:10px;}
.delivery-card.priority{border-left:4px solid var(--red);}

/* IMG UPLOAD */
.img-up{border:2px dashed var(--border);border-radius:var(--r);padding:20px;text-align:center;cursor:pointer;transition:all .2s;}
.img-up:hover{border-color:var(--rose);background:var(--petal);}
.img-prev{width:100%;height:200px;object-fit:contain;border-radius:var(--r);background:var(--cream);}
.img-prev-thumb{width:80px;height:80px;object-fit:cover;border-radius:8px;border:2px solid var(--border);}
.code-badge{font-family:monospace;font-size:11px;background:var(--cream);border:1px solid var(--border);border-radius:6px;padding:3px 8px;color:var(--ink2);}

/* IA CHAT */
.chat-wrap{height:360px;overflow-y:auto;border:1px solid var(--border);border-radius:var(--r);padding:12px;background:var(--cream);}
.chat-msg{margin-bottom:10px;}
.chat-msg.user{text-align:right;}
.chat-bubble{display:inline-block;padding:8px 12px;border-radius:12px;font-size:12px;max-width:85%;line-height:1.5;}
.chat-msg.user .chat-bubble{background:var(--rose);color:#fff;border-bottom-right-radius:2px;}
.chat-msg.ai .chat-bubble{background:#fff;border:1px solid var(--border);border-bottom-left-radius:2px;}
.chat-input-wrap{display:flex;gap:8px;margin-top:10px;}

/* COMMISSION */
.comm-bar{height:8px;border-radius:4px;background:#F3F4F6;overflow:hidden;margin-top:4px;}
.comm-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,var(--rose),var(--rose-d));}


/* DELIVERY SMART */
.delivery-priority{border-left:4px solid var(--red)!important;animation:pulse-red 2s infinite;}
.delivery-warning{border-left:4px solid var(--gold)!important;}
.delivery-ok{border-left:4px solid var(--leaf)!important;}
@keyframes pulse-red{0%,100%{box-shadow:0 0 0 0 rgba(220,38,38,0.3)}50%{box-shadow:0 0 0 6px rgba(220,38,38,0)}}
.risk-badge{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:20px;font-size:10px;font-weight:600;}
.risk-high{background:var(--red-l);color:var(--red);}
.risk-med{background:var(--gold-l);color:var(--gold);}
.risk-ok{background:var(--leaf-l);color:var(--leaf);}
.delivery-queue-item{background:#fff;border:1px solid var(--border);border-radius:var(--r);padding:14px;margin-bottom:10px;transition:all .2s;}
.delivery-queue-item:hover{box-shadow:var(--shadow);}
.suggest-badge{background:linear-gradient(135deg,var(--rose),var(--rose-d));color:#fff;padding:4px 10px;border-radius:20px;font-size:10px;font-weight:600;letter-spacing:1px;}
.notif-msg-preview{background:var(--petal);border-radius:var(--r);padding:12px;font-size:12px;color:var(--ink2);line-height:1.6;border-left:3px solid var(--rose);margin-top:8px;}
.client-suggestion{padding:10px 12px;cursor:pointer;border-bottom:1px solid var(--border);transition:background .15s;}
.client-suggestion:hover{background:var(--petal);}
.client-suggestion:last-child{border-bottom:none;}

/* RESPONSIVE */
@media(max-width:768px){
  .sb{transform:translateX(-100%);}
  .sb.open{transform:translateX(0);}
  .main{margin-left:0;}
  .g4,.g3,.g2,.pdv-grid{grid-template-columns:1fr;}
  .mob-btn{display:flex!important;}
}
.mob-btn{display:none;align-items:center;justify-content:center;width:32px;height:32px;border:none;background:var(--cream);border-radius:8px;cursor:pointer;font-size:16px;}
</style>
</head>
<body>
<div id="root"></div>
<script>
const API = 'https://florevita-backend.onrender.com/api';
const CLAUDE_API = 'https://api.anthropic.com/v1/messages';

// ── BAIRROS DE MANAUS ────────────────────────────────────────
const BAIRROS_MANAUS = [
  'Adrianópolis','Aleixo','Alvorada','Armando Mendes','Betânia','Cachoeirinha',
  'Centro','Chapada','Cidade de Deus','Cidade Nova','Colégio Militar','Colônia Antônio Aleixo',
  'Colônia Oliveira Machado','Colônia Santo Antônio','Colônia Terra Nova','Compensa',
  'Coroado','Crespo','Da Paz','Distrito Industrial I','Distrito Industrial II',
  'Dom Pedro','Educandos','Flores','Gilberto Mestrinho','Glória','Japiim',
  'Jorge Teixeira','Lago Azul','Lagoa Azul','Lírio do Vale','Mauazinho',
  'Monte das Oliveiras','Morada do Sol','Morro da Liberdade','Nossa Senhora Aparecida',
  'Nossa Senhora das Graças','Nova Cidade','Nova Esperança','Novo Aleixo','Novo Israel',
  'Parque 10 de Novembro','Petrópolis','Planalto','Ponta Negra','Praça 14 de Janeiro',
  'Presidente Vargas','Puraquequara','Raiz','Redenção','Rio Piorini','Santa Etelvina',
  'Santa Luzia','Santo Agostinho','Santo Antônio','São Francisco','São Geraldo',
  'São José Operário','São Lázaro','São Raimundo','Tancredo Neves','Tarumã',
  'Tarumã-Açu','União da Vitória','Zumbi dos Palmares'
].sort();

// ── STATE ────────────────────────────────────────────────────
let S = {
  user: null, token: null, page: 'dashboard',
  clients:[], products:[], orders:[], users:[], _userSearch:'',
  stockMoves:[], _stockFilter:'todos', _stockUnit:'',
  _prodDate:'', _prodShift:'Todos', _expDate:'',
  _printedCard:JSON.parse(localStorage.getItem('fv_printed_card')||'{}'), _printedComanda:JSON.parse(localStorage.getItem('fv_printed_comanda')||'{}'), _expDate:'',
  financialEntries:[], _relPeriod:'mes', _relUnit:'', _finUnit:'', _iaLoading:false,
  _userSearch:'',
  loading:false, toast:null, sidebarOpen:false,
  alerts:[], chatHistory:[],
  _modal:'', _pdidoFilter:'Todos', _clientSel:null,
  _clientSearch:'', _prodSearch:'', _prodCat:'',
  // Ponto & Funcionários
  _pontoHistDate:'', _funcPeriod:'mes', _funcUser:'',
};

// PDV state
// Delivery fees config (saved in localStorage)
let DELIVERY_FEES = JSON.parse(localStorage.getItem('fv_delivery_fees')||'{"Manaus":{"Zona Centro":15,"Zona Norte":20,"Zona Sul":18,"Zona Leste":20,"Zona Oeste":18,"Outros":25}}');
function saveDeliveryFees(){localStorage.setItem('fv_delivery_fees',JSON.stringify(DELIVERY_FEES));}

let PDV = {
  cart:[], discount:0, payment:'Pix',
  clientId:'', clientName:'', clientPhone:'', clientEmail:'',
  recipient:'', cardMessage:'', notes:'',
  deliveryDate:'', deliveryPeriod:'Manhã', deliveryTime:'',
  street:'', neighborhood:'', number:'', city:'', cep:'',
  reference:'', isCondominium:false, block:'', apt:'',
  type:'Delivery', deliveryFee:0, zone:'', clientSearch:'',
  pickupUnit:'', saleUnit:'', notifyClient:true, identifyClient:true,
  _showQuickReg:false
};

// ── UTILS ────────────────────────────────────────────────────
const $c = v => new Intl.NumberFormat('pt-BR',{style:'currency',currency:'BRL'}).format(v||0);
const $d = d => d ? new Date(d).toLocaleDateString('pt-BR') : '—';
const ini = n => n ? n.split(' ').map(w=>w[0]).slice(0,2).join('').toUpperCase() : '?';
const sc = s => ({'Entregue':'t-green','Em preparo':'t-gold','Saiu p/ entrega':'t-purple','Aguardando':'t-gray','Cancelado':'t-red','Pago':'t-green','Pendente':'t-gold','Pronto':'t-blue','Em Produção':'t-gold','Pagar na Entrega':'t-gold'}[s]||'t-gray');
const segc = s => ({'VIP':'t-rose','Recorrente':'t-green','Novo':'t-blue'}[s]||'t-gray');
const rolec = r => ({'Administrador':'t-rose','Gerente':'t-purple','Atendimento':'t-blue','Producao':'t-green','Expedicao':'t-gold','Financeiro':'t-gray','Entregador':'t-blue'}[r]||'t-gray');
const emoji = c => ({'Rosa':'🌹','Buquê':'💐','Orquídea':'🌸','Planta':'🌱','Kit':'🎁','Vaso':'🌿','Flor':'🌺','Coroa':'👑','Cesta':'🧺','Embalagem':'📦','Adicional':'✨'}[c]||'🌸');

// ── API ──────────────────────────────────────────────────────
// ── API CALL — com timeout, rate-limit e renovação de sessão ──
const _apiCalls = {}; // rate limit tracker
async function api(method, path, body=null) {
  // Rate limit: máx 30 requests/10s por endpoint
  const key = method+path;
  const now = Date.now();
  _apiCalls[key] = (_apiCalls[key]||[]).filter(t=>now-t<10000);
  if(_apiCalls[key].length >= 30) throw new Error('Muitas requisições. Aguarde um momento.');
  _apiCalls[key].push(now);

  // Timeout de 15 segundos
  const ctrl = new AbortController();
  const timeout = setTimeout(()=>ctrl.abort(), 15000);

  const opts = {
    method,
    signal: ctrl.signal,
    headers:{
      'Content-Type':'application/json',
      ...(S.token ? {'Authorization':'Bearer '+S.token} : {})
    }
  };
  if(body) opts.body = JSON.stringify(body);

  try{
    const res = await fetch(API+path, opts);
    clearTimeout(timeout);
    let data;
    try { data = await res.json(); } catch(e) { data = {}; }

    // Sessão expirada → logout automático
    if(res.status===401 && S.user){
      logout(); toast('⚠️ Sessão expirada. Faça login novamente.', true); return;
    }

    if(!res.ok) throw new Error(data.error||data.message||`Erro ${res.status}`);
    return data;
  }catch(e){
    clearTimeout(timeout);
    if(e.name==='AbortError') throw new Error('Tempo limite da requisição (15s). Verifique sua conexão.');
    throw e;
  }
}
const GET    = p    => api('GET',p);
const POST   = (p,b)=> api('POST',p,b);

// ── SESSION ──────────────────────────────────────────────────
function saveSession(token,user){
  S.token=token; S.user=user;
  localStorage.setItem('fv2_token',token);
  localStorage.setItem('fv2_user',JSON.stringify(user));
  localStorage.setItem('fv2_last_activity', Date.now().toString());
}
function loadSession(){
  const t=localStorage.getItem('fv2_token');
  const u=localStorage.getItem('fv2_user');
  const lastActivity = parseInt(localStorage.getItem('fv2_last_activity')||'0');
  // Auto-logout após 8 horas de inatividade
  if(t&&u&&(Date.now()-lastActivity < 8*60*60*1000)){
    S.token=t; S.user=mergeUserExtra(JSON.parse(u)); return true;
  }
  if(t) { localStorage.removeItem('fv2_token'); localStorage.removeItem('fv2_user'); }
  return false;
}

// Atualiza timestamp de atividade em qualquer interação
['click','keydown','touchstart'].forEach(ev=>{
  document.addEventListener(ev,()=>{
    if(S.token) localStorage.setItem('fv2_last_activity', Date.now().toString());
  }, {passive:true});
});
function logout(){stopPolling();localStorage.removeItem('fv2_token');localStorage.removeItem('fv2_user');S.user=null;S.token=null;render();}

// ── USER EXTRA (role/unit/display name stored locally) ────────
function getUserExtra(id){ try{return JSON.parse(localStorage.getItem('fv_user_extra')||'{}')[id]||{};}catch(e){return{};} }
function setUserExtra(id, data){
  try{
    const all=JSON.parse(localStorage.getItem('fv_user_extra')||'{}');
    all[id]={...(all[id]||{}), ...data};
    localStorage.setItem('fv_user_extra',JSON.stringify(all));
  }catch(e){}
}
function mergeUserExtra(u){
  if(!u||!u._id) return u;
  const extra = getUserExtra(u._id);
  return {...u, ...extra};
}

async function doLogin(email,pass){
  try{S.loading=true;render();
  const d=await POST('/auth/login',{email,password:pass});
  const user = mergeUserExtra(d.user);
  saveSession(d.token,user);await loadData();S.loading=false;
  // Entregador vai direto para o módulo de entregas
  if(user.role==='Entregador') S.page='entregador';
  startPolling(8000);
  render();toast('✅ Bem-vinda, '+user.name+'!');
  }catch(e){S.loading=false;render();toast('❌ E-mail ou senha incorretos');}
}
async function loadData(){
  try{
    const[c,p,o,u,sm]=await Promise.all([
      GET('/clients'),GET('/products'),GET('/orders'),
      GET('/users').catch(()=>[]),
      GET('/stock/moves').catch(()=>[])
    ]);
    S.clients=c||[];S.products=p||[];S.orders=o||[];
    S.users=(u||[]).map(mergeUserExtra); // aplica role/unit local
    S.stockMoves=sm||[];
  }catch(e){console.log(e);}
}

// ── POLLING TEMPO REAL ────────────────────────────────────────
let _pollTimer = null, _pollCount = 0;
const POLL_PAGES = ['producao','expedicao','entregador','pedidos','dashboard','caixa'];

async function pollData(){
  if(!S.user||!S.token||S.loading||S._modal) return;
  _pollCount++;
  try{
    // Sempre busca orders (dados mais críticos)
    const orders = await GET('/orders').catch(()=>null);
    let changed = false;
    if(orders && JSON.stringify(orders)!==JSON.stringify(S.orders)){ S.orders=orders; changed=true; }

    // A cada 4 ciclos (~30s): busca produtos e estoque também
    if(_pollCount%4===0){
      const [products, stock] = await Promise.all([
        GET('/products').catch(()=>null),
        GET('/stock/moves').catch(()=>null),
      ]);
      if(products && JSON.stringify(products)!==JSON.stringify(S.products)){ S.products=products; changed=true; }
      if(stock    && JSON.stringify(stock)   !==JSON.stringify(S.stockMoves)){ S.stockMoves=stock; changed=true; }
    }

    if(changed && !S.loading && POLL_PAGES.includes(S.page)){
      const root=document.getElementById('root');
      if(root){root.innerHTML=renderApp();bindApp();}
      const ind=document.getElementById('sync-dot');
      if(ind){ind.style.background='#4ade80';setTimeout(()=>{if(ind)ind.style.background='rgba(255,255,255,.3)';},600);}
    }
  }catch(e){}
}
function startPolling(ms=8000){ stopPolling(); _pollCount=0; _pollTimer=setInterval(pollData,ms); }
function stopPolling(){ if(_pollTimer){clearInterval(_pollTimer);_pollTimer=null;} }


function toast(msg,err=false){S.toast={msg,err};render();setTimeout(()=>{S.toast=null;render();},3500);}
function setPage(p){
  // Entregador só pode acessar seus módulos
  if(S.user?.role==='Entregador' && p!=='entregador' && p!=='ponto'){
    toast('❌ Acesso restrito'); return;
  }
  S.page=p; S.sidebarOpen=false; render();
}

};
// Alias legado
const PERMS = PERMS_DEFAULT;

// Salva/recupera permissões customizadas por usuário (localStorage)
function getUserPerms(userId){
  const stored = JSON.parse(localStorage.getItem('fv_perms')||'{}');
  const p = stored[userId];
  // Retorna null se não existe OU se é array vazio (sem permissões definidas)
  return (p && p.length > 0) ? p : null;
}
function setUserPerms(userId, perms){
  const stored = JSON.parse(localStorage.getItem('fv_perms')||'{}');
  stored[userId] = perms;
  localStorage.setItem('fv_perms', JSON.stringify(stored));
}

function can(mod){
  if(!S.user) return false;
  // Administrador sempre pode tudo
  if(S.user.role==='Administrador') return true;
  // Entregador: SEMPRE só delivery e ponto — ignora perms customizadas
  if(S.user.role==='Entregador') return mod==='delivery' || mod==='ponto';
  // Outros: verifica permissões customizadas salvas
  const custom = getUserPerms(S.user._id);
  if(custom && custom.length > 0) return custom.includes('*') || custom.includes(mod);
  // Fallback para padrão do cargo
  const p = PERMS_DEFAULT[S.user.role] || [];
  return p.includes('*') || p.includes(mod);
}

    {icon:'✅',msg:'Pagamento aprovado — Pedido #0023',color:'#2D6A4F',time:'5min'},
    {icon:'⚠️',msg:'Pedido #0019 atrasado — 2h',color:'#B7860F',time:'1h'},
  ];
  return alerts.map(a=>`

      <div style="font-size:12px;color:var(--rose);font-weight:600">${$c(p.salePrice)}</div>

</div>

<div>

  <div class="card-title">🛒 Pedido</div>

  ${!['Loja Novo Aleixo','Loja Allegro Mall','CDLE'].includes(S.user.unit)?`

  <!-- BUSCA CLIENTE - últimos 6 dígitos do celular -->

    </div>

    ${(()=>{

  const filtered = unit ? S.products.filter(p=>!p.unit||p.unit===unit||p.unit==='Todas') : S.products;

  return`

      <div class="alert al-info">Produtos transferidos do CDLE para as lojas são registrados aqui.</div>

// ── PRODUÇÃO ─────────────────────────────────────────────────
function renderProducao(){
  const today = new Date();
  today.setHours(0,0,0,0);
  const selectedDate = S._prodDate || today.toISOString().split('T')[0];
  const isToday = selectedDate === today.toISOString().split('T')[0];
  
  // Filter orders for selected date
  const allQueue = S.orders.filter(o=>['Aguardando','Em preparo','Pronto'].includes(o.status));
  
  const forDate = allQueue.filter(o=>{
    if(!o.scheduledDate) return isToday; // sem data = para hoje
    const d = new Date(o.scheduledDate);
    d.setHours(0,0,0,0);
    const sel = new Date(selectedDate);
    sel.setHours(0,0,0,0);
    return d.getTime()===sel.getTime();
  });

  const byShift = {
    'Manhã': forDate.filter(o=>o.scheduledPeriod==='Manhã'||!o.scheduledPeriod),
    'Tarde': forDate.filter(o=>o.scheduledPeriod==='Tarde'),
    'Noite': forDate.filter(o=>o.scheduledPeriod==='Noite'),
    'Horário específico': forDate.filter(o=>o.scheduledPeriod==='Horário específico'),
  };

  const activeShift = S._prodShift||'Todos';
  const shiftFiltered = activeShift==='Todos' ? forDate : (byShift[activeShift]||[]);

  return`
<div class="g4" style="margin-bottom:16px;">
  <div class="mc rose"><div class="mc-label">Para ${isToday?'Hoje':'Esta Data'}</div><div class="mc-val">${forDate.length}</div></div>
  <div class="mc gold"><div class="mc-label">Em Produção</div><div class="mc-val">${forDate.filter(o=>o.status==='Em preparo').length}</div></div>
  <div class="mc leaf"><div class="mc-label">Prontos</div><div class="mc-val">${forDate.filter(o=>o.status==='Pronto').length}</div></div>
  <div class="mc purple"><div class="mc-label">Aguardando</div><div class="mc-val">${forDate.filter(o=>o.status==='Aguardando').length}</div></div>
</div>

<div class="card" style="margin-bottom:14px;">
  <div style="display:flex;gap:12px;align-items:center;flex-wrap:wrap;">
    <div style="display:flex;gap:6px;align-items:center;">
      <button class="btn btn-sm ${isToday?'btn-primary':'btn-ghost'}" id="btn-prod-today">📅 Hoje</button>
      <input type="date" class="fi" id="prod-date-picker" value="${selectedDate}" style="width:160px;"/>
    </div>
    <div style="display:flex;gap:4px;">
      ${['Todos','Manhã','Tarde','Noite','Horário específico'].map(s=>`
      <button class="btn btn-xs ${activeShift===s?'btn-primary':'btn-ghost'}" data-shift="${s}">
        ${s==='Manhã'?'☀️':s==='Tarde'?'🌤️':s==='Noite'?'🌙':s==='Horário específico'?'🕐':'📋'} ${s}
        ${s!=='Todos'&&byShift[s]?.length?`(${byShift[s].length})`:''}
      </button>`).join('')}
    </div>
    <button class="btn btn-ghost btn-sm" id="btn-rel-orders">🔄</button>
  </div>
</div>

${shiftFiltered.length===0?`
<div class="empty card">
  <div class="empty-icon">🌿</div>
  <p>Nenhum pedido para ${isToday?'hoje':$d(selectedDate)} ${activeShift!=='Todos'?'no turno '+activeShift:''}</p>
</div>`:`

<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:14px;">
${shiftFiltered.map(o=>{
  const isLate = o.scheduledPeriod==='Manhã' && new Date().getHours()>=12 && o.status!=='Pronto';
  const isUrgent = o.scheduledPeriod==='Tarde' && new Date().getHours()>=16 && o.status!=='Pronto';
  return`
  <div style="background:#fff;border-radius:var(--rl);border:1px solid ${isLate?'var(--red)':isUrgent?'var(--gold)':'var(--border)'};padding:16px;box-shadow:var(--shadow);">
    ${isLate?`<div class="tag t-red" style="margin-bottom:8px">🔴 ATRASADO</div>`:isUrgent?`<div class="tag t-gold" style="margin-bottom:8px">⚡ URGENTE</div>`:''}
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">
      <span style="font-weight:700;color:var(--rose);font-size:16px">${o.orderNumber}</span>
      <span class="tag ${sc(o.status)}">${o.status}</span>
    </div>

    <div style="display:flex;gap:4px;margin-bottom:8px;flex-wrap:wrap;">
      <span class="tag t-gray">${o.scheduledPeriod||'Sem turno'}</span>
      ${o.scheduledTime?`<span class="tag t-blue">🕐 ${o.scheduledTime}</span>`:''}
      ${o.type==='Delivery'?`<span class="tag t-purple">🚚 Delivery</span>`:`<span class="tag t-gray">🏪 ${o.type||'Balcão'}</span>`}
    </div>

    <!-- PRODUTOS COM FOTO -->
    <div style="margin-bottom:10px;">
      ${(o.items||[]).map(i=>{
        const prod = S.products.find(p=>p._id===i.product||p.name===i.name);
        return`<div style="display:flex;align-items:center;gap:10px;padding:8px;background:var(--cream);border-radius:var(--r);margin-bottom:6px;">
          ${prod?.images?.[0]
            ?`<img src="${prod.images[0]}" style="width:56px;height:56px;border-radius:8px;object-fit:contain;background:#fff;border:1px solid var(--border);flex-shrink:0" onclick="showFullImg('${prod.images[0]}')" title="Clique para ampliar"/>`

    ${o.notes?`<div style="font-size:11px;color:var(--muted);margin-bottom:8px;">📝 ${o.notes}</div>`:''}

    <!-- ENDEREÇO -->
    ${o.deliveryAddress?`<div style="font-size:11px;color:var(--muted);margin-bottom:10px;">📍 ${o.deliveryAddress}</div>`:''}

}).join('')}

}


// ── EXPEDIÇÃO ────────────────────────────────────────────────
function renderExpedicao(){
  const today = new Date();
  today.setHours(0,0,0,0);
  const selectedDate = S._expDate || today.toISOString().split('T')[0];
  const isToday = selectedDate === today.toISOString().split('T')[0];

  // Pedidos prontos para expedir na data selecionada
  const forDate = S.orders.filter(o=>{
    if(o.status==='Cancelado'||o.status==='Balcão') return false;
    if(o.type!=='Delivery'&&o.type!=='Retirada') return false;
    if(!o.scheduledDate) return isToday;
    const d = new Date(o.scheduledDate);
    d.setHours(0,0,0,0);
    const sel = new Date(selectedDate);
    sel.setHours(0,0,0,0);
    return d.getTime()===sel.getTime();
  });

  const emProducao = forDate.filter(o=>['Aguardando','Em preparo'].includes(o.status));
  const prontos = forDate.filter(o=>o.status==='Pronto');
  const emRota = forDate.filter(o=>o.status==='Saiu p/ entrega');

  return`

  <div class="mc rose"><div class="mc-label">Entregues Hoje</div><div class="mc-val">${S.orders.filter(o=>o.status==='Entregue'&&new Date(o.createdAt).toDateString()===new Date().toDateString()).length}</div></div>

    <input type="date" class="fi" id="exp-date-picker" value="${selectedDate}" style="width:160px;"/>

    <span style="font-size:12px;color:var(--muted);">${isToday?'Entregas de hoje':'Entregas de '+$d(selectedDate)}</span>

${emProducao.length>0?`

      <div class="card-title">📦 Prontos para Expedir
        <span class="notif">${prontos.length}</span>

      ${prontos.map(o=>`

        <!-- FOTOS DOS PRODUTOS -->

  <div>

            <span class="tag t-purple">Em Rota</span>
          </div>
        </div>
        <div style="font-size:12px;font-weight:500">${o.client?.name||o.clientName||'—'}</div>
        ${o.recipient?`<div style="font-size:11px;color:var(--muted)">Para: ${o.recipient}</div>`:''}
        <div style="font-size:11px;color:var(--muted);margin-bottom:8px;">📍 ${o.deliveryAddress||'—'}</div>

// ── ENTREGADOR ───────────────────────────────────────────────
function renderEntregador(){
  const isDriver = S.user.role==='Entregador';

  // Entregador só vê suas próprias entregas atribuídas na Expedição
  // NUNCA mostra entregas sem entregador ou de outro entregador
  const all = S.orders.filter(o => o.status==='Saiu p/ entrega');
  const minhas = sortOrdersByPriority(
    isDriver
      ? all.filter(o => {
          const nomeBateu = o.driverName && o.driverName.trim().toLowerCase() === S.user.name?.trim().toLowerCase();
          const idBateu   = o.driverId   && o.driverId === S.user._id;
          return nomeBateu || idBateu;
        })
      : all  // Gerente/Admin vê todas
  );
  const hasCritical = minhas.some(o=>['late','critical'].includes(getDeliveryRisk(o)));
  return`
${hasCritical ? `<div class="alert al-err">🚨 <strong>ATENÇÃO!</strong> Há entregas com risco de atraso!</div>` : `<div class="alert al-ok">🚚 Olá, ${S.user?.name?.split(' ')[0]}! Você tem <strong>${minhas.length} entrega(s)</strong> hoje.</div>`}
${minhas.length===0 ? `<div class="empty card"><div class="empty-icon">✅</div><p>Sem entregas pendentes atribuídas a você</p></div>` :
minhas.map((o,idx) => {
  const risk = getDeliveryRisk(o);
  const riskColor = getRiskColor(risk);
  const borderColor = {late:'var(--red)',critical:'#FF6B00',warning:'var(--gold)',ok:'var(--leaf)',none:'var(--border)'}[risk];
  return `
<div class="delivery-card" style="border-left:4px solid ${borderColor};background:${risk==='late'?'#FFF5F5':risk==='critical'?'#FFF8F0':'#fff'}">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">
    <div style="display:flex;align-items:center;gap:8px;">
      <span style="background:var(--rose);color:#fff;border-radius:50%;width:26px;height:26px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700">${idx+1}</span>
      <span style="font-weight:700;color:var(--rose);font-size:15px">${o.orderNumber}</span>
    </div>
    <div style="display:flex;align-items:center;gap:6px;">
      ${o.driverName?`<span style="background:var(--blue-l);color:var(--blue);border-radius:20px;padding:2px 10px;font-size:11px;font-weight:600;">🚚 ${o.driverName}</span>`:''}
      <span style="font-size:12px;font-weight:700;color:${riskColor}">${getRiskLabel(risk)}</span>
    </div>
  </div>
  ${risk==='late'||risk==='critical' ? `<div style="background:${risk==='late'?'var(--red-l)':'#FFF0E6'};border-radius:6px;padding:8px 12px;font-size:12px;color:${riskColor};font-weight:600;margin-bottom:10px;">
    ${risk==='late'?'🚨 PEDIDO ATRASADO':'⚠️ Menos de 1h — Prioridade máxima!'}
  </div>` : ''}
  ${(o.items||[]).map(i=>{
    const p=S.products.find(pr=>pr.name===i.name||pr._id===i.product);
    return `<div style="display:flex;align-items:center;gap:10px;margin-bottom:8px;padding:8px;background:var(--cream);border-radius:8px;">
      ${p?.images?.[0]?`<img src="${p.images[0]}" style="width:52px;height:52px;border-radius:8px;object-fit:contain;background:#fff;flex-shrink:0">`:`<span style="font-size:28px;flex-shrink:0">🌸</span>`}
      <div><div style="font-size:13px;font-weight:600">${i.qty}x ${i.name}</div></div>
    </div>`;
  }).join('')}
  <hr/>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px;">
    <div>
      <div style="font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1px">Destinatário</div>
      <div style="font-size:14px;font-weight:600">${o.recipient||o.client?.name||o.clientName||'—'}</div>
    </div>
    <div>
      <div style="font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1px">Horário</div>
      <div style="font-size:14px;font-weight:600">${o.scheduledPeriod||'—'} ${o.scheduledTime||''}</div>
    </div>
  </div>
  <div style="background:var(--cream);border-radius:8px;padding:10px;margin-bottom:10px;">
    <div style="font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:4px">Endereço</div>
    <div style="font-size:13px;font-weight:500">${o.deliveryAddress||'—'}</div>
    ${o.isCondominium?`<div style="font-size:11px;color:var(--blue);margin-top:2px">🏢 Bloco ${o.block}, Ap ${o.apt}</div>`:''}
    ${o.reference?`<div style="font-size:11px;color:var(--muted);margin-top:2px">Ref: ${o.reference}</div>`:''}
  </div>
  ${o.cardMessage?`<div style="background:var(--petal);padding:10px;border-radius:8px;font-size:12px;font-style:italic;margin-bottom:10px;border-left:3px solid var(--rose)">"${o.cardMessage}"</div>`:''}
  
  ${o.payment==='Pagar na Entrega'?`
  <div style="background:var(--gold-l);border-radius:8px;padding:10px 12px;margin-bottom:10px;border-left:3px solid var(--gold);">
    <div style="font-size:12px;font-weight:700;color:var(--gold);">💰 COBRAR NA ENTREGA: ${$c(o.total)}</div>
    <div style="font-size:11px;color:var(--ink2);margin-top:3px;">${o.paymentOnDelivery==='Dinheiro'?'💵 Cobrar em Dinheiro':o.paymentOnDelivery==='Levar Maquineta'?'💳 Levar Maquineta (Débito/Crédito/Pix)':'Forma a definir'}</div>
  </div>`:''}

  <div style="display:flex;gap:8px;flex-wrap:wrap;">
    <a href="https://maps.google.com/?q=${encodeURIComponent(o.deliveryAddress||'')}" target="_blank" class="btn btn-blue btn-sm" style="flex:1;justify-content:center;text-align:center">🗺️ Ver Rota</a>
    <button class="btn btn-green btn-sm" data-open-confirm="${o._id}" style="flex:1;justify-content:center">✅ Confirmar Entrega</button>
  </div>
</div>`;
}).join('')}`;
}


// ── MODAL CONFIRMAR ENTREGA ────────────────────────────────────
function showConfirmDeliveryModal(orderId){
  const o = S.orders.find(x=>x._id===orderId);
  if(!o) return;
  S._modal=`<div class="mo" id="mo"><div class="mo-box" style="max-width:480px;" onclick="event.stopPropagation()">
  <div class="mo-title">✅ Confirmar Entrega — ${o.orderNumber}</div>

  <div style="background:var(--cream);border-radius:var(--r);padding:12px;margin-bottom:14px;font-size:12px;">
    <div style="font-weight:600;margin-bottom:4px;">📦 ${(o.items||[]).map(i=>`${i.qty}x ${i.name}`).join(', ')}</div>
    <div style="color:var(--muted);">👤 Para: ${o.recipient||o.client?.name||o.clientName||'—'}</div>
    <div style="color:var(--muted);">📍 ${o.deliveryAddress||'—'}</div>
    ${o.payment==='Pagar na Entrega'?`<div style="color:var(--gold);font-weight:600;margin-top:6px;">💰 Cobrar ${$c(o.total)} — ${o.paymentOnDelivery||'Verificar forma'}</div>`:''}
  </div>

  <div class="fg">
    <label class="fl">Quem recebeu? <span style="color:var(--red)">*</span></label>
    <input class="fi" id="conf-receiver" placeholder="Nome de quem assinou / recebeu o pedido" autocomplete="off"/>
    <div style="font-size:10px;color:var(--muted);margin-top:3px;">Obrigatório — anote o nome de quem recebeu na porta</div>
  </div>

  <div class="fg">
    <label class="fl">📷 Foto da entrega <span style="font-size:10px;color:var(--muted)">(opcional)</span></label>
    <div style="border:2px dashed var(--border);border-radius:var(--r);padding:16px;text-align:center;cursor:pointer;transition:all .2s;" id="photo-drop-zone" onclick="document.getElementById('conf-photo-input').click()">
      <div id="photo-preview-wrap">
        <div style="font-size:28px;margin-bottom:6px;">📷</div>
        <div style="font-size:12px;color:var(--muted);">Toque para tirar foto ou escolher da galeria</div>
      </div>
    </div>
    <input type="file" id="conf-photo-input" accept="image/*" capture="environment" style="display:none"/>
  </div>

  <div class="mo-foot">
    <button class="btn btn-green" id="btn-do-confirm" style="flex:1;justify-content:center;padding:11px;font-size:14px;">
      ✅ Confirmar Entrega
    </button>
    <button class="btn btn-ghost" id="btn-mo-close">Cancelar</button>
  </div>
  </div></div>`;
  render();

  document.getElementById('btn-mo-close')?.addEventListener('click',()=>{S._modal='';render();});

  // Preview da foto
  let photoBase64 = '';
  document.getElementById('conf-photo-input')?.addEventListener('change',e=>{
    const file = e.target.files?.[0];
    if(!file) return;
    const reader = new FileReader();
    reader.onload = ev=>{
      photoBase64 = ev.target.result;
      const wrap = document.getElementById('photo-preview-wrap');
      if(wrap) wrap.innerHTML=`<img src="${photoBase64}" style="max-width:100%;max-height:200px;border-radius:8px;object-fit:contain;"/>
        <div style="font-size:11px;color:var(--leaf);margin-top:6px;">✅ Foto adicionada — toque para trocar</div>`;
      const zone = document.getElementById('photo-drop-zone');
      if(zone){ zone.style.borderColor='var(--leaf)'; zone.style.background='var(--leaf-l)'; }
    };
    reader.readAsDataURL(file);
  });

  // Confirmar
  document.getElementById('btn-do-confirm')?.addEventListener('click',async()=>{
    const receiver = document.getElementById('conf-receiver')?.value?.trim();
    if(!receiver){
      document.getElementById('conf-receiver').style.borderColor='var(--red)';
      document.getElementById('conf-receiver').focus();
      toast('❌ Informe quem recebeu o pedido', true);
      return;
    }
    // Salva confirmação localmente (quem recebeu + foto)
    const confirmations = JSON.parse(localStorage.getItem('fv_deliveries')||'{}');
    confirmations[orderId] = { receiver, photo: photoBase64||null, confirmedAt: new Date().toISOString(), confirmedBy: S.user.name };
    localStorage.setItem('fv_deliveries', JSON.stringify(confirmations));

    S._modal=''; render();
    await advanceOrder(orderId);
    toast('✅ Entrega confirmada! Recebido por: '+receiver);
  });
}

// ── PONTO ELETRÔNICO ─────────────────────────────────────────
function getPontoRecords(){ return JSON.parse(localStorage.getItem('fv_ponto')||'[]'); }
function savePontoRecords(r){ localStorage.setItem('fv_ponto',JSON.stringify(r)); }

function renderPonto(){
  const todayStr = new Date().toISOString().split('T')[0];
  const now = new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
  const records = getPontoRecords();

    const total=toMin(r.saida)-toMin(r.chegada);
    const almoco=(r.saidaAlmoco&&r.voltaAlmoco)?(toMin(r.voltaAlmoco)-toMin(r.saidaAlmoco)):0;
    const liq=total-almoco;

    return `${Math.floor(liq/60)}h${String(liq%60).padStart(2,'0')}m`;

let _backupTimer = null;
function startAutoBackup(){
  stopAutoBackup();
  _backupTimer = setInterval(()=>doAutoBackup(), 2*60*60*1000); // 2 horas
}
function stopAutoBackup(){ if(_backupTimer){clearInterval(_backupTimer);_backupTimer=null;} }
function doAutoBackup(){
  const data = {
    version:'1.0', timestamp:new Date().toISOString(), user:S.user?.name||'Sistema',
    fv_perms:     localStorage.getItem('fv_perms')||'{}',
    fv_user_extra:localStorage.getItem('fv_user_extra')||'{}',
    fv_backend_enums:localStorage.getItem('fv_backend_enums')||'{}',
    fv_ponto:     localStorage.getItem('fv_ponto')||'[]',
    fv_caixa:     localStorage.getItem('fv_caixa')||'[]',
    fv_financial: localStorage.getItem('fv_financial')||'[]',
    fv_activities:localStorage.getItem('fv_activities')||'[]',
    fv_deliveries:localStorage.getItem('fv_deliveries')||'{}',
    fv_config:    localStorage.getItem('fv_config')||'{}',
    fv_print_layout:localStorage.getItem('fv_print_layout')||'{}',
    fv_delivery_fees:localStorage.getItem('fv_delivery_fees')||'{}',
    fv_printed_card:localStorage.getItem('fv_printed_card')||'{}',
    fv_printed_comanda:localStorage.getItem('fv_printed_comanda')||'{}',
  };
  // Salva histórico de backups
  const hist = JSON.parse(localStorage.getItem('fv_backup_hist')||'[]');
  hist.unshift({ts:data.timestamp,user:data.user,auto:true});
  if(hist.length>20) hist.length=20;
  localStorage.setItem('fv_backup_hist',JSON.stringify(hist));
  localStorage.setItem('fv_last_backup',JSON.stringify(data));
  return data;
}
function downloadBackup(){
  const data = doAutoBackup();
  const blob = new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href = url; a.download = 'lacos-eternos-backup-'+new Date().toISOString().slice(0,16).replace('T','_').replace(/:/g,'-')+'.json';
  a.click(); URL.revokeObjectURL(url);
  toast('✅ Backup baixado com sucesso!');
}
function restoreBackup(json){
  try{
    const d = JSON.parse(json);
    if(!d.version) throw new Error('Arquivo inválido');
    Object.keys(d).forEach(k=>{
      if(k.startsWith('fv_')) localStorage.setItem(k,d[k]);
    });
    toast('✅ Backup restaurado! Recarregue a página.'); return true;
  }catch(e){ toast('❌ Erro ao restaurar: '+e.message); return false; }
}

// ── RELATÓRIOS ───────────────────────────────────────────────
function renderRelatorios(){
  const period = S._relPeriod||'mes';
  const unit   = S._relUnit||'';
  const tab    = S._relTab||'geral';
  const now    = new Date();

  const inPeriod = d=>{
    const dt=new Date(d);
    if(period==='hoje') return dt.toDateString()===now.toDateString();
    if(period==='semana'){const w=new Date(now);w.setDate(now.getDate()-7);return dt>=w;}
    if(period==='mes') return dt.getMonth()===now.getMonth()&&dt.getFullYear()===now.getFullYear();
    if(period==='mes_ant'){const m=now.getMonth()===0?11:now.getMonth()-1;const y=now.getMonth()===0?now.getFullYear()-1:now.getFullYear();return dt.getMonth()===m&&dt.getFullYear()===y;}
    return true;
  };

  const base    = unit ? S.orders.filter(o=>o.unit===unit) : S.orders;
  const filtered= base.filter(o=>inPeriod(o.createdAt));
  const validos = filtered.filter(o=>o.status!=='Cancelado');
  const entregues=filtered.filter(o=>o.status==='Entregue');
  const fat     = validos.reduce((s,o)=>s+(o.total||0),0);
  const ticket  = validos.length ? fat/validos.length : 0;
  const acts    = getActivities().filter(a=>inPeriod(a.date));

  // Produtos
  const byProd={};
  validos.forEach(o=>(o.items||[]).forEach(i=>{
    if(!byProd[i.name])byProd[i.name]={qty:0,rev:0};
    byProd[i.name].qty+=i.qty||1;
    byProd[i.name].rev+=(i.totalPrice||i.unitPrice*(i.qty||1)||0);
  }));
  const prodList=Object.entries(byProd).sort((a,b)=>b[1].rev-a[1].rev);
  const maxRev=prodList[0]?.[1]?.rev||1;

  // Por usuário (atividades)
  const byUser={};
  acts.forEach(a=>{
    if(!byUser[a.userId])byUser[a.userId]={name:a.userName,role:a.userRole,vendas:0,fat:0,montagens:0,expedicoes:0};
    if(a.type==='venda'){byUser[a.userId].vendas++;byUser[a.userId].fat+=(a.total||0);}
    if(a.type==='montagem') byUser[a.userId].montagens++;
    if(a.type==='expedicao') byUser[a.userId].expedicoes++;
  });

  // Por entregador
  const byDriver={};
  entregues.forEach(o=>{
    const d=o.driverName||'Sem entregador';
    if(!byDriver[d])byDriver[d]={entregas:0,total:0};
    byDriver[d].entregas++;byDriver[d].total+=(o.total||0);
  });

  // Por pgto
  const byPay={};
  validos.forEach(o=>{const p=o.payment||'—';if(!byPay[p])byPay[p]={qty:0,total:0};byPay[p].qty++;byPay[p].total+=(o.total||0);});

  // Por unidade
  const byUnit={};
  validos.forEach(o=>{const u=o.unit||'—';if(!byUnit[u])byUnit[u]={qty:0,total:0};byUnit[u].qty++;byUnit[u].total+=(o.total||0);});

  const periodLabel={hoje:'Hoje',semana:'Semana',mes:'Este Mês',mes_ant:'Mês Anterior',todos:'Todo o Período'}[period]||'';

  const tabBtn=(k,l)=>`<button class="tab ${tab===k?'active':''}" data-rel-tab="${k}">${l}</button>`;

  return`
<!-- Filtros -->
<div class="card" style="margin-bottom:14px;">
  <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center;">
    <div style="display:flex;gap:3px;">

// ── ALERTAS (dados reais) ─────────────────────────────────────
function renderAlertas(){
  const now = Date.now();
  const alertas = [];

  // Pedidos atrasados
  S.orders.filter(o=>['Aguardando','Em preparo','Saiu p/ entrega'].includes(o.status)).forEach(o=>{
    if(!o.scheduledDate) return;
    const diff = new Date(o.scheduledDate).getTime() - now;
    if(diff<0){
      alertas.push({icon:'🚨',tipo:'Pedido Atrasado',msg:`${o.orderNumber} — ${o.client?.name||o.clientName||'—'}`,cor:'var(--red)',lido:false,ts:new Date(o.scheduledDate)});
    } else if(diff < 2*60*60*1000){
      alertas.push({icon:'⏰',tipo:'Entrega em 2h',msg:`${o.orderNumber} — ${o.client?.name||o.clientName||'—'}`,cor:'var(--gold)',lido:false,ts:new Date(o.scheduledDate)});
    }
  });

  // Estoque crítico
  S.products.filter(p=>(p.stock||0)<=(p.minStock||5)&&(p.stock||0)>0).forEach(p=>{
    alertas.push({icon:'📦',tipo:'Estoque Crítico',msg:`${p.name} — ${p.stock} unidade(s)`,cor:'var(--gold)',lido:true,ts:new Date()});
  });
  S.products.filter(p=>(p.stock||0)===0).forEach(p=>{
    alertas.push({icon:'🚫',tipo:'Sem Estoque',msg:`${p.name} — esgotado`,cor:'var(--red)',lido:false,ts:new Date()});
  });

  // Pedidos recentes (últimos 30 min)
  S.orders.filter(o=>{const d=new Date(o.createdAt);return now-d.getTime()<30*60*1000;}).slice(0,3).forEach(o=>{
    alertas.push({icon:'🛍️',tipo:'Novo Pedido',msg:`${o.orderNumber} — ${o.client?.name||o.clientName||'—'} · ${$c(o.total)}`,cor:'var(--blue)',lido:false,ts:new Date(o.createdAt)});
  });

  // Pedidos entregues hoje
  const hoje=new Date().toDateString();
  S.orders.filter(o=>o.status==='Entregue'&&new Date(o.updatedAt||o.createdAt).toDateString()===hoje).slice(0,3).forEach(o=>{
    alertas.push({icon:'✅',tipo:'Entrega Confirmada',msg:`${o.orderNumber} — ${o.driverName?'por '+o.driverName:''}`,cor:'var(--leaf)',lido:true,ts:new Date(o.updatedAt||o.createdAt)});
  });

  alertas.sort((a,b)=>b.ts-a.ts);

  return`
<div class="card">
  <div class="card-title">🔔 Central de Alertas
    <span class="tag t-rose">${alertas.filter(a=>!a.lido).length} novos</span>
  </div>
  ${alertas.length===0?`<div class="empty"><div class="empty-icon">✅</div><p>Nenhum alerta no momento</p></div>`:''}
  ${alertas.map(a=>`
  <div style="display:flex;align-items:center;gap:12px;padding:12px;border-radius:var(--r);margin-bottom:8px;border:1px solid ${a.lido?'var(--border)':'var(--rose-l)'};background:${a.lido?'#fff':'var(--petal)'};">
    <div style="font-size:22px;flex-shrink:0">${a.icon}</div>
    <div style="flex:1">
      <div style="font-size:11px;color:${a.cor};font-weight:600;text-transform:uppercase;letter-spacing:1px">${a.tipo}</div>
      <div style="font-size:13px;font-weight:500;margin-top:2px">${a.msg}</div>
    </div>
    <div style="font-size:11px;color:var(--muted);flex-shrink:0">${a.ts.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'})}</div>
    ${!a.lido?`<div style="width:8px;height:8px;border-radius:50%;background:var(--rose);flex-shrink:0"></div>`:''}
  </div>`).join('')}
</div>`;
}

// ── SALVAR USUÁRIO ────────────────────────────────────────────
async function saveUser(editId=null){
  const name     = document.getElementById('mu-name')?.value?.trim()||'';
  const email    = document.getElementById('mu-email')?.value?.trim()||'';
  const pass     = document.getElementById('mu-pass')?.value||'';
  const phone    = document.getElementById('mu-phone')?.value?.trim()||'';
  const comm     = parseFloat(document.getElementById('mu-comm')?.value)||0;
  const commType = document.getElementById('mu-comm-type')?.value||'percentual';
  const active   = document.getElementById('mu-active')?.checked !== false;
  const role     = document.getElementById('mu-role')?.value || 'Atendimento';
  const unit     = document.getElementById('mu-unit')?.value || 'Loja Novo Aleixo';

  // Coleta módulos marcados
  const perms = [];
  document.querySelectorAll('.mod-cb').forEach(cb => {
    if(cb.checked) perms.push(cb.dataset.mod);
  });
  const finalPerms = perms.length > 0 ? perms : (PERMS_DEFAULT[role] || []);

  // Validações
  if(!name)  return toast('❌ Nome é obrigatório');
  if(!email) return toast('❌ E-mail é obrigatório');
  if(!editId && !pass)         return toast('❌ Senha obrigatória para novo usuário');
  if(!editId && pass.length<6) return toast('❌ Senha: mínimo 6 caracteres');
  if(editId  && pass && pass.length<6) return toast('❌ Nova senha: mínimo 6 caracteres');

  // Fecha modal e mostra loading
  S._modal=''; S.loading=true;
  try{ render(); }catch(e){}

  // Dados base (sem role/unit — backend pode ter enum restrito)
  const base = { name, email, phone, commissionRate:comm, commissionType:commType, active };
  if(pass) base.password = pass;

  // 3 tentativas em cascata para lidar com restrições de enum do backend
  let u=null, saved=false, lastErr='';
  const attempts = [
    {...base, role, unit},                        // 1ª: valores corretos
    base,                                         // 2ª: só dados básicos
    {...base, role:'Administrador', unit:'Todas'}, // 3ª: fallback garantido
  ];

  for(const data of attempts){
    try{
      u = editId ? await PUT('/users/'+editId, data) : await POST('/users', data);
      saved = true;
      break;
    }catch(e){
      lastErr = e.message||'';
      const isSchemaErr = /enum|valid|required|cast/i.test(lastErr);
      if(!isSchemaErr) break;
    }
  }

  S.loading = false;

  if(!saved){
    try{ render(); }catch(e){}
    if(/email|duplicate|E11000/i.test(lastErr))
      return toast('❌ E-mail já cadastrado. Use outro e-mail.', true);
    return toast('❌ Erro: '+(lastErr||'Verifique os dados'), true);
  }

  // ID retornado pelo backend
  const uid = u?._id || u?.id || editId;
  if(!uid){ try{render();}catch(e){} return toast('❌ Erro: ID não retornado pelo servidor', true); }

  // Salva cargo, unidade e permissões localmente (independente do backend)
  setUserExtra(uid, { role, unit, name, email });
  setUserPerms(uid, finalPerms);

  // Atualiza lista S.users
  const merged = mergeUserExtra({ ...(u||{}), _id:uid });
  if(editId) S.users = S.users.map(x => x._id===editId ? {...x,...merged} : x);
  else if(merged._id) S.users.unshift(merged);

  // Atualiza sessão própria se for o usuário logado
  if(S.user?._id===uid){
    S.user = {...S.user,...merged};
    localStorage.setItem('fv2_user', JSON.stringify(S.user));
  }

  try{ render(); }catch(e){}
  toast(editId ? `✅ ${name} atualizado! Cargo: ${role}` : `✅ ${name} cadastrado! Login: ${email}`);
}

// ── EXCLUIR USUÁRIO ───────────────────────────────────────────
async function deleteUser(id){
  const u = S.users.find(x=>x._id===id);
  if(!u) return;
  S._modal=`<div class="mo" id="mo"><div class="mo-box" style="max-width:400px;text-align:center;" onclick="event.stopPropagation()">
  <div style="font-size:40px;margin-bottom:12px">⚠️</div>
  <div style="font-family:'Playfair Display',serif;font-size:18px;margin-bottom:8px;">Excluir Usuário?</div>
  <div style="font-size:13px;color:var(--muted);margin-bottom:20px;">
    <strong>${u.name}</strong> (${u.email})<br>Esta ação não pode ser desfeita.
  </div>
  <div style="display:flex;gap:8px;justify-content:center;">
    <button class="btn btn-red" id="btn-del-confirm" style="padding:10px 24px;">🗑️ Sim, excluir</button>
    <button class="btn btn-ghost" id="btn-del-cancel">Cancelar</button>
  </div>
  </div></div>`;
  render();
  document.getElementById('btn-del-cancel')?.addEventListener('click',()=>{S._modal='';render();});
  document.getElementById('btn-del-confirm')?.addEventListener('click',async()=>{
    S._modal=''; S.loading=true; try{render();}catch(e){}
    try{
      await DELETE('/users/'+id);
    }catch(e){
      // Mesmo que falhe no backend, remove localmente
    }
    // Remove da lista e do localStorage
    S.users = S.users.filter(x=>x._id!==id);
    const perms = JSON.parse(localStorage.getItem('fv_perms')||'{}');
    delete perms[id];
    localStorage.setItem('fv_perms',JSON.stringify(perms));
    const extras = JSON.parse(localStorage.getItem('fv_user_extra')||'{}');
    delete extras[id];
    localStorage.setItem('fv_user_extra',JSON.stringify(extras));
    S.loading=false; try{render();}catch(e){}
    toast(`🗑️ ${u.name} excluído.`);
  });
}

}

async function saveStockMove(prodId, type){
  const qty = parseInt(document.getElementById('sm-qty')?.value||0);
  const unit = document.getElementById('sm-unit')?.value;
  const reason = document.getElementById('sm-reason')?.value;
  const obs = document.getElementById('sm-obs')?.value;
  if(!qty||qty<=0) return toast('❌ Informe a quantidade');
  try{
    S.loading=true;S._modal='';render();
    const move = await POST('/stock',{product:prodId,type,qty,unit,reason:obs?reason+' — '+obs:reason});
    S.stockMoves.unshift(move);
    // Update product stock locally
    S.products = S.products.map(p=>{
      if(p._id===prodId){
        const newStock = type==='Entrada' ? (p.stock||0)+qty : Math.max(0,(p.stock||0)-qty);
        return {...p, stock:newStock};
      }
      return p;
    });
    S.loading=false;render();
    toast(`✅ ${type} de ${qty} unidades registrada!`);
  }catch(e){S.loading=false;render();}
}

async function saveTransfer(){
  const prodId = document.getElementById('tr-prod')?.value;
  const from = document.getElementById('tr-from')?.value;
  const to = document.getElementById('tr-to')?.value;
  const qty = parseInt(document.getElementById('tr-qty')?.value||0);
  const obs = document.getElementById('tr-obs')?.value;
  if(!prodId) return toast('❌ Selecione o produto');
  if(!qty||qty<=0) return toast('❌ Informe a quantidade');
  if(from===to) return toast('❌ Origem e destino devem ser diferentes');
  try{
    S.loading=true;S._modal='';render();
    const move = await POST('/stock',{product:prodId,type:'Transferência',qty,unit:from,unitDest:to,reason:obs||'Transferência entre unidades'});
    S.stockMoves.unshift(move);
    S.loading=false;render();
    toast(`✅ Transferência de ${qty} unidades registrada!`);
  }catch(e){S.loading=false;render();}
}

async function loadStockMoves(){
  try{
    const moves = await GET('/stock/moves');
    S.stockMoves = moves||[];
  }catch(e){ S.stockMoves=[]; }
}

  const phone=document.getElementById('mc-phone')?.value.trim();
  const email=document.getElementById('mc-email')?.value||'';
  const birthday=document.getElementById('mc-bday')?.value||undefined;
  const street=document.getElementById('mc-street')?.value||'';
  const number=document.getElementById('mc-num')?.value||'';
  const neighborhood=document.getElementById('mc-neigh')?.value||'';
  const segment=document.getElementById('mc-seg')?.value||'Novo';
  const notes=document.getElementById('mc-notes')?.value||'';
  const cliCode='CLI-'+String(S.clients.length+1).padStart(3,'0');

  try{

    const c=await POST('/clients',{

async function saveProduct(editId=null, prodCode=null){
  const name=document.getElementById('mp-name')?.value.trim();
  if(!name) return toast('❌ Nome obrigatório');
  // Lê campos de tributação
  const taxation = {
    ncm: document.getElementById('mp-ncm')?.value||'',
    cfop: document.getElementById('mp-cfop')?.value||'',
    cest: document.getElementById('mp-cest')?.value||'',
    cst: document.getElementById('mp-cst')?.value||'',
    origin: document.getElementById('mp-origin')?.value||'0',
    icms: parseFloat(document.getElementById('mp-icms')?.value)||0,
    iss: parseFloat(document.getElementById('mp-iss')?.value)||0,
    pis: parseFloat(document.getElementById('mp-pis')?.value)||0,
    cofins: parseFloat(document.getElementById('mp-cofins')?.value)||0,
    unitTrib: document.getElementById('mp-unit-trib')?.value||'UN',
  };
  const data={
    name, code:prodCode,
    category:document.getElementById('mp-cat')?.value,
    costPrice:parseFloat(document.getElementById('mp-cost')?.value)||0,
    salePrice:parseFloat(document.getElementById('mp-price')?.value)||0,
    stock:parseInt(document.getElementById('mp-stock')?.value)||0,
    minStock:parseInt(document.getElementById('mp-minstk')?.value)||5,
    description:document.getElementById('mp-desc')?.value,
    productionNotes:document.getElementById('mp-prodnotes')?.value,
    activeOnSite:document.getElementById('mp-site')?.checked,
    taxation,
    unit:'Todas'
  };
  if(S._prodImg) data.images=[S._prodImg];
  try{
    S.loading=true;S._modal='';S._prodImg=null;render();
    let p;
    if(editId){p=await PUT('/products/'+editId,data);S.products=S.products.map(x=>x._id===editId?p:x);}
    else{p=await POST('/products',data);S.products.unshift(p);}
    S.loading=false;render();toast(editId?'✅ Produto atualizado!':'✅ Produto cadastrado!');
  }catch(e){S.loading=false;render();}
}

let _pdvLock = false;
async function finalizePDV(){
  if(_pdvLock) return toast('⏳ Processando pedido, aguarde...');
  _pdvLock = true;
  try{ await _finalizePDV(); } finally { _pdvLock = false; }
}
async function _finalizePDV(){
  if(!PDV.cart.length) return toast('❌ Adicione produtos');
  const validUnitsCheck = ['Loja Novo Aleixo','Loja Allegro Mall','CDLE'];
  if(!validUnitsCheck.includes(S.user.unit)&&!PDV.saleUnit) return toast('❌ Selecione a unidade de venda');
  // Valida unidade para Admin
  if((S.user.unit==='Todas'||S.user.role==='Administrador')&&!PDV.saleUnit) return toast('❌ Selecione a unidade de venda');
  if(!PDV.clientId&&!PDV.clientName) return toast('❌ Informe o nome do cliente');
  if(!PDV.clientId&&!PDV.clientPhone) return toast('❌ WhatsApp do cliente é obrigatório');
  // ── VALIDAÇÕES OBRIGATÓRIAS ──────────────────────────────
  if(!PDV.clientId&&!PDV.clientName?.trim()){
    toast('❌ Nome do cliente é obrigatório');
    document.getElementById('pdv-phone-search')?.focus();
    return;
  }
  if(!PDV.clientId&&!PDV.clientPhone?.trim()){
    toast('❌ WhatsApp do cliente é obrigatório');
    return;
  }
  if(PDV.type==='Delivery'||PDV.type==='Retirada'){
    if(!PDV.deliveryDate){
      toast('❌ Data de entrega é obrigatória');
      document.getElementById('pdv-date')?.focus();
      return;
    }
    if(!PDV.deliveryPeriod){
      toast('❌ Turno de entrega é obrigatório');
      return;
    }
  }
  if(PDV.type==='Retirada'&&!PDV.pickupUnit){
    toast('❌ Selecione a loja de retirada');
    return;
  }
  if(PDV.type==='Delivery'){
    if(!PDV.neighborhood?.trim()){
      toast('❌ Bairro de entrega é obrigatório');
      document.getElementById('pdv-neighborhood')?.focus();
      return;
    }
    if(PDV.isCondominium&&(!PDV.block||!PDV.apt)){
      toast('❌ Bloco e apartamento são obrigatórios para condomínio');
      return;
    }
  }
  // ─────────────────────────────────────────────────────────
  const sub=PDV.cart.reduce((s,i)=>s+i.price*i.qty,0);
  const deliveryFee=PDV.type==='Delivery'?(PDV.deliveryFee||0):0;
  const total=sub-(PDV.discount||0)+deliveryFee;
  const addr=[PDV.street,PDV.number,PDV.neighborhood,PDV.city,PDV.isCondominium?`Bloco ${PDV.block} Ap ${PDV.apt}`:'',PDV.reference].filter(Boolean).join(', ');
  // Determina unidade correta — nunca envia 'Todas'
  const validUnits = ['Loja Novo Aleixo','Loja Allegro Mall','CDLE'];
  const orderUnit = validUnits.includes(S.user.unit) ? S.user.unit : (PDV.saleUnit||'Loja Novo Aleixo');
  const data={
    ...(PDV.clientId ? {client:PDV.clientId} : {}),
    clientName: PDV.clientName||undefined,
    clientPhone: PDV.clientPhone||undefined,
    items:PDV.cart.map(i=>({product:i.id,name:i.name,qty:i.qty,unitPrice:i.price,totalPrice:i.price*i.qty})),
    subtotal:sub,discount:PDV.discount||0,total,
    payment:PDV.payment,type:PDV.type,
    scheduledDate:PDV.deliveryDate||undefined,
    scheduledPeriod:PDV.deliveryPeriod,
    scheduledTime:PDV.deliveryTime,
    recipient:PDV.recipient,
    cardMessage:PDV.cardMessage,
    notes:PDV.notes,
    deliveryAddress:addr,
    deliveryStreet:PDV.street,
    deliveryNumber:PDV.number,
    deliveryNeighborhood:PDV.neighborhood,
    deliveryReference:PDV.reference,
    isCondominium:PDV.isCondominium,
    block:PDV.block,apt:PDV.apt,
    source:'PDV',
    unit:orderUnit,
    paymentOnDelivery: PDV.payment==='Pagar na Entrega' ? PDV.paymentOnDelivery : undefined,
    deliveryFee:PDV.deliveryFee||0,
    deliveryZone:PDV.zone,
    deliveryCity:PDV.city,
    pickupUnit:PDV.pickupUnit||undefined,
    notifyClient:PDV.notifyClient,
    identifyClient:PDV.identifyClient,
  };
  try{
    S.loading=true;render();
    const o=await POST('/orders',data);
    S.orders.unshift(o);
    // Log atividade de venda
    logActivity('venda', o);
    // Notifica loja sobre novo pedido via WhatsApp
    notifyNewOrderWhatsApp(o);
    notifyWhatsApp(o);
    // Pergunta se quer imprimir comanda
    S._newOrderId = o._id;
    PDV={cart:[],discount:0,payment:'Pix',clientId:'',clientName:'',clientPhone:'',clientEmail:'',recipient:'',cardMessage:'',notes:'',deliveryDate:'',deliveryPeriod:'Manhã',deliveryTime:'',street:'',neighborhood:'',number:'',city:'',cep:'',reference:'',isCondominium:false,block:'',apt:'',type:'Delivery',deliveryFee:0,zone:'',clientSearch:'',pickupUnit:'',saleUnit:'',notifyClient:true,identifyClient:true,_showQuickReg:false};
    S.loading=false;S.page='pedidos';render();
    toast('✅ Pedido '+o.orderNumber+' criado!');
    // Auto print comanda after 500ms
    setTimeout(()=>{
      if(o?.orderNumber){
        // Pergunta se quer imprimir — sem usar confirm() bloqueado
        S._modal=`<div class="mo" id="mo"><div class="mo-box" style="max-width:400px;text-align:center;" onclick="event.stopPropagation()">
        <div style="font-size:36px;margin-bottom:10px">🖨️</div>
        <div style="font-size:16px;font-weight:700;margin-bottom:6px">Pedido ${o.orderNumber} criado!</div>
        <div style="font-size:13px;color:var(--muted);margin-bottom:18px">Deseja imprimir a comanda agora?</div>
        <div style="display:flex;gap:8px;justify-content:center;">
          <button class="btn btn-primary" id="btn-sim-imprimir">🖨️ Sim, Imprimir</button>
          <button class="btn btn-ghost" id="btn-nao-imprimir">Não agora</button>
        </div></div></div>`;
        render();
        document.getElementById('btn-sim-imprimir')?.addEventListener('click',()=>{S._modal='';render();printComanda(o._id);});
        document.getElementById('btn-nao-imprimir')?.addEventListener('click',()=>{S._modal='';render();});
      }
    }, 600);
  }catch(e){S.loading=false;render();}
}

  const msg = [
    '🌺 *NOVO PEDIDO — Laços Eternos*',

    `*Nº do Pedido:* ${order.orderNumber||'—'}`,
    `*Produto:*\n${items}`,

    `*Turno:* ${order.scheduledPeriod||'—'} ${order.scheduledTime||''}`,

    '',

function notifyWhatsApp(order){
  const num = '5592993002433';
  const items = (order.items||[]).map(i=>`• ${i.qty}x ${i.name}`).join('\n');
  const msg = [
    '🌺 *NOVO PEDIDO — Laços Eternos*',
    `*Nº:* ${order.orderNumber||'—'}`,
    `*Cliente:* ${order.client?.name||order.clientName||'—'} ${order.clientPhone?'('+order.clientPhone+')':''}`,
    `*Produto:*\n${items}`,
    order.recipient?`*Destinatário:* ${order.recipient}`:'',
    order.deliveryAddress?`*Endereço:* ${order.deliveryAddress}`:'',
    order.scheduledPeriod?`*Turno:* ${order.scheduledPeriod} ${order.scheduledTime||''}`:'',
    order.cardMessage?`*Cartão:* "${order.cardMessage}"`:'',
    `*Pgto:* ${order.payment||'—'} · *Total:* ${new Intl.NumberFormat('pt-BR',{style:'currency',currency:'BRL'}).format(order.total||0)}`,
    order.notes?`*Obs:* ${order.notes}`:'',
  ].filter(Boolean).join('\n');

  // Tenta enviar sem abrir nova janela usando fetch
  // Como não temos API WhatsApp Business, abre discretamente em background
  const link = `https://wa.me/${num}?text=${encodeURIComponent(msg)}`;
  // Salva para log de notificações
  const logs = JSON.parse(localStorage.getItem('fv_notif_logs')||'[]');
  logs.unshift({orderNum:order.orderNumber, msg, time:new Date().toISOString(), link});
  localStorage.setItem('fv_notif_logs', JSON.stringify(logs.slice(0,20)));
  // Abre em nova aba minimizada
  const w = window.open(link, '_blank', 'width=1,height=1,left=-100,top=-100');
  setTimeout(()=>{ try{ if(w&&!w.closed) w.close(); }catch(e){} }, 3000);
}

async function advanceOrder(id){
  const o=S.orders.find(x=>x._id===id);if(!o)return;
  const nxt={'Aguardando':'Em preparo','Em preparo':'Pronto','Pronto':'Saiu p/ entrega','Saiu p/ entrega':'Entregue'};
  const ns=nxt[o.status];if(!ns)return toast('Pedido já finalizado');
  try{
    await PATCH('/orders/'+id+'/status',{status:ns});
    S.orders=S.orders.map(x=>x._id===id?{...x,status:ns}:x);
    // Log atividade
    if(ns==='Pronto') logActivity('montagem', o);

      if(updated) sendDeliveryNotification(updated);

Para mensagens de cartão: crie textos bonitos, emocionantes e personalizados conforme a ocasião.

// ── DELIVERY HELPERS ────────────────────────────────────────
function getDeliveryRisk(order) {
  if (!order.scheduledDate && !order.scheduledTime) return 'none';
  const now = new Date();
  const delivDate = new Date(order.scheduledDate || now);
  const [h, m] = (order.scheduledTime || '23:59').split(':').map(Number);
  delivDate.setHours(h || 23, m || 59, 0, 0);
  const diffMin = (delivDate - now) / 60000;
  if (diffMin < 0) return 'late';
  if (diffMin < 60) return 'critical';
  if (diffMin < 120) return 'warning';
  return 'ok';
}

function getRiskLabel(risk) {
  return {late:'🚨 ATRASADO', critical:'⚠️ CRÍTICO', warning:'⏰ Atenção', ok:'✅ OK', none:'—'}[risk] || '—';
}
function getRiskColor(risk) {
  return {late:'var(--red)', critical:'#FF6B00', warning:'var(--gold)', ok:'var(--leaf)', none:'var(--muted)'}[risk] || 'var(--muted)';
}

function sortOrdersByPriority(orders) {
  const riskWeight = {late:0, critical:1, warning:2, ok:3, none:4};
  const periodWeight = {'Manhã':0,'Tarde':1,'Noite':2};
  return [...orders].sort((a, b) => {
    const ra = getDeliveryRisk(a), rb = getDeliveryRisk(b);
    if (riskWeight[ra] !== riskWeight[rb]) return riskWeight[ra] - riskWeight[rb];
    const pa = periodWeight[a.scheduledPeriod] ?? 99;
    const pb = periodWeight[b.scheduledPeriod] ?? 99;
    if (pa !== pb) return pa - pb;
    const ta = a.scheduledTime || '99:99', tb = b.scheduledTime || '99:99';
    return ta.localeCompare(tb);
  });
}

function playAlert() {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.frequency.value = 880; gain.gain.value = 0.3;
    osc.start(); osc.stop(ctx.currentTime + 0.3);
  } catch(e) {}
}

// WhatsApp notification on delivery confirmed
function sendWhatsAppDeliveryConfirm(order) {
  const waConfig = JSON.parse(localStorage.getItem('fv_whats_config')||'{}');
  const tmpl = waConfig.tmplEntrega || localStorage.getItem('fv_delivery_msg') ||
    'Olá, {nome}! 🌺 Seu pedido {pedido} foi entregue com sucesso. Esperamos que tenha amado! 💖 Laços Eternos';
  const clientName = order.client?.name || order.clientName || 'Cliente';
  const clientPhone = order.client?.phone || order.clientPhone || '';
  if (!clientPhone) return;
  const msg = tmpl
    .replace(/{nome}/gi, clientName)
    .replace(/{pedido}/gi, order.orderNumber || '')
    .replace(/{total}/gi, $c(order.total||0))
    .replace(/{data}/gi, new Date().toLocaleDateString('pt-BR'))
    .replace(/{floricultura}/gi, 'Laços Eternos');
  const phone = '55' + clientPhone.replace(/\D/g,'');
  // Log no histórico de notificações
  const hist = JSON.parse(localStorage.getItem('fv_whats_hist')||'[]');
  hist.unshift({ts:new Date().toISOString(),tipo:'entrega',para:clientName+' ('+clientPhone+')',msg,status:'enviado',pedido:order.orderNumber});
  if(hist.length>50) hist.length=50;
  localStorage.setItem('fv_whats_hist',JSON.stringify(hist));
  // Tenta API automática se configurada
  if(waConfig.apiUrl && waConfig.apiToken){
    fetch(waConfig.apiUrl,{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+waConfig.apiToken},
      body:JSON.stringify({number:phone,text:msg})}).catch(()=>{});
  } else {
    window.open(`https://wa.me/${phone}?text=${encodeURIComponent(msg)}`, '_blank');
  }
}

function notifyNewOrderWhatsApp(order){
  const waConfig = JSON.parse(localStorage.getItem('fv_whats_config')||'{}');
  if(!waConfig.numIfood && !waConfig.numero) return;
  const tmpl = waConfig.tmplPedido || '🛍️ NOVO PEDIDO {pedido}!\nCliente: {cliente}\nTotal: {total}\nEntrega: {data}\n{itens}';
  const msg = tmpl
    .replace(/{pedido}/gi, order.orderNumber||'')
    .replace(/{cliente}/gi, order.client?.name||order.clientName||'—')
    .replace(/{total}/gi, $c(order.total||0))
    .replace(/{data}/gi, order.scheduledDate?new Date(order.scheduledDate).toLocaleDateString('pt-BR'):'A definir')
    .replace(/{itens}/gi, (order.items||[]).map(i=>`• ${i.qty}x ${i.name}`).join('\n'));
  const destNum = (waConfig.numIfood||waConfig.numero||'').replace(/\D/g,'');
  if(!destNum) return;
  const hist = JSON.parse(localStorage.getItem('fv_whats_hist')||'[]');
  hist.unshift({ts:new Date().toISOString(),tipo:'pedido',para:'Loja ('+destNum+')',msg,status:'enviado',pedido:order.orderNumber});
  if(hist.length>50) hist.length=50;
  localStorage.setItem('fv_whats_hist',JSON.stringify(hist));
  if(waConfig.apiUrl && waConfig.apiToken){
    fetch(waConfig.apiUrl,{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+waConfig.apiToken},
      body:JSON.stringify({number:'55'+destNum,text:msg})}).catch(()=>{});
  }
}
